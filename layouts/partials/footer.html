<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-info">
      {{ with .Site.Params.footer.note }}
      <p class="footer-note">{{ . }}</p>
      {{ end }}
    </div>
    <nav class="footer-links" aria-label="Site">
      {{ range .Site.Menus.main }}
        {{ if ne .Identifier "center" }}
          <a href="{{ .URL }}" class="footer-link">{{ .Name }}</a>
        {{ end }}
      {{ end }}
      <a href="https://github.com/PenumbraOS/" class="footer-link" target="_blank" rel="noopener">{{ partial "icons/github.html" }}GitHub</a>
      {{ range .Site.Menus.main }}
        {{ if eq .Identifier "center" }}
          <a href="{{ .URL }}" class="footer-link">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </nav>
  </div>
</footer>
